name: Deploy

# Manual-dispatch only, deliberately: no production Supabase project exists yet (see
# supabase/README.md § Environments) and none of the secrets below are configured, so
# triggering this on every push to `main` would just fail forever until an operator sets
# both up. Once a production project + secrets exist, an operator can add a `push: tags:
# ['v*']` trigger here for release-tag deploys — see docs/runbooks/deploy.md.
#
# Runs all three tiers (db, functions, web) from the one commit this workflow checks out,
# so client and server always ship from the same source — the desync scenario #249 flags
# (a forgotten `functions deploy` leaving the client bundle talking to an older engine)
# can't happen when they're one workflow instead of three separately-run manual steps.
on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # --- 1. Database: apply any pending migrations (supabase/README.md § Adding a
      # migration). `supabase db push` only ever applies migrations not yet recorded on
      # the linked project — safe to run on a deploy where nothing changed.
      - name: Link Supabase project
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Push database migrations
        run: pnpm exec supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # --- 2. Edge functions: deploy every function in supabase/functions (README.md
      # § Deploy & run). Function-scoped secrets (STRIPE_SECRET_KEY, CRON_SECRET, etc.)
      # are configured on the Supabase project directly, not passed through this workflow.
      # deno.json's @aop/* import map points at the generated (gitignored) _vendor/
      # tree (#339) — the bundler can't see packages/*/src, so vendor first.
      - name: Vendor @aop/* workspace deps
        run: node scripts/vendor-function-deps.mjs
      - name: Deploy edge functions
        run: pnpm exec supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      # --- 3. Function smoke test, deliberately BEFORE the Vercel tier (operator-approved
      # restructure, 2026-07-14): with VERCEL_TOKEN unset the Vercel steps skip, and this
      # must still run — it verifies the edge-function deploy that already happened above.
      #
      # list-open-matches requires a real user JWT (`requireUserId` in
      # supabase/functions/_shared/client.ts calls `auth.getUser()` on the bearer token,
      # not just the anon key), so an unauthenticated call can't reach a literal 200 here
      # without also provisioning and rotating a dedicated smoke-test account's
      # credentials as a secret — a persistent-test-account decision left to the operator
      # (see docs/runbooks/deploy.md). What this DOES prove without that: the function is
      # deployed, reachable, and its auth boundary is executing. list-open-matches has no
      # `verify_jwt = false` override in supabase/config.toml, so a request with no
      # Authorization header is rejected at the platform gateway (401
      # UNAUTHORIZED_NO_AUTH_HEADER) before the function's own code ever runs — same
      # gateway behavior documented for stripe-webhook/compact-snapshots in config.toml
      # (#218). Treat anything else as a failed deploy.
      - name: Smoke test — list-open-matches is deployed and enforcing auth
        run: |
          status=$(curl -s -o /tmp/smoke.json -w '%{http_code}' \
            -X POST "$SUPABASE_URL/functions/v1/list-open-matches" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $status"
          cat /tmp/smoke.json
          echo
          if [ "$status" != "401" ]; then
            echo "::error::expected 401 UNAUTHORIZED (no Authorization header supplied), got $status"
            exit 1
          fi
          if ! grep -q '"code"' /tmp/smoke.json; then
            echo "::error::response body is not the { error: { code, message } } envelope"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # --- 4. Web client: build + deploy to Vercel production. SKIPPED without
      # VERCEL_TOKEN (operator-approved, 2026-07-14): the web tier auto-deploys via
      # Vercel's GitHub integration on every main merge, so a token-less dispatch still
      # ships db + functions and goes green instead of dying here with the remaining
      # steps skipped. Setting the token upgrades a dispatch to an atomic three-tier
      # deploy from one commit (closes the merge-time/dispatch-time ENGINE_VERSION skew
      # window — the #249 scenario this workflow exists for). No vercel.json/.vercel
      # dir is committed (gitignored, per Vercel's own convention), so `vercel pull`
      # fetches the project's build settings and env vars fresh every run.
      - name: Check Vercel configuration
        id: vercel_config
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not configured — skipping the Vercel tier; the web app auto-deploys from main via the Vercel GitHub integration (#425)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Install Vercel CLI
        if: steps.vercel_config.outputs.configured == 'true'
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        if: steps.vercel_config.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build for Vercel
        if: steps.vercel_config.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel (production)
        id: vercel_deploy
        if: steps.vercel_config.outputs.configured == 'true'
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # --- 5. Web smoke test: only meaningful when the Vercel tier above actually
      # deployed (it probes that deploy's URL); the auto-deployed web tier is watched by
      # the synthetic monitor instead.
      - name: Smoke test — web app is live
        if: steps.vercel_config.outputs.configured == 'true'
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "${{ steps.vercel_deploy.outputs.url }}")
          echo "HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::error::web app root returned $status"
            exit 1
          fi
