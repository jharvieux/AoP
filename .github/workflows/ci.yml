name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detect whether any non-documentation files changed. Gates the `ci` and
  # `edge-functions` jobs so doc-only PRs skip the full build suite (docs-only
  # PRs still report a passing check, not a skipped check, because the job
  # explicitly runs with `if: false` — GitHub branch protection treats an
  # explicitly-skipped required job as passing, not blocking).
  #
  # Why not paths-ignore? Because `ci` is a required status check. A workflow
  # trigger filtered by `paths-ignore` means the check never reports on a
  # doc-only PR — and GitHub branch protection treats a required check that
  # never ran as blocking. This `detect-changes` gates a job with `if:` instead,
  # which is reported to branch protection as explicitly skipped (passing).
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: detect
        run: |
          # Fail safe: any git error defaults to code=true (run full CI)
          set +e

          # For PRs, diff against the base ref; for pushes to main, use HEAD^
          if [ -n "${{ github.base_ref }}" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="HEAD^"
          fi

          # List changed files, filter out docs-only patterns
          changes=$(git diff --name-only "$base...HEAD" 2>/dev/null)
          if [ $? -ne 0 ]; then
            echo "code=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If no changes at all, skip CI (code=false)
          if [ -z "$changes" ]; then
            echo "code=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any non-doc file changed
          code=false
          while IFS= read -r file; do
            # Skip doc-only patterns: *.md, docs/*, SESSION.md, MEMORY*.md
            if [[ "$file" != *.md && "$file" != docs/* ]]; then
              code=true
              break
            fi
          done <<< "$changes"

          if [ "$code" = true ]; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=false" >> $GITHUB_OUTPUT
          fi

  ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # For docs-only changes, run format:check only (skip typecheck/test/build).
  # This ensures formatting is enforced even on docs-only PRs.
  format-check-only:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  # supabase/functions is not a pnpm workspace — it runs on Deno, not Node (see
  # supabase/functions/README.md) — so the `ci` job above never typechecks or tests it.
  # This job is the Deno-side equivalent of `pnpm typecheck` / `pnpm test` (#248).
  edge-functions:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # --node-modules-dir=none: this job never runs `pnpm install`, and without it Deno
      # detects the repo's pnpm-workspace.yaml and tries to rewrite the root package.json
      # into an npm "workspaces" field before resolving npm: specifiers — package.json is
      # a sensitive/supervised path (CLAUDE.md), so CI must never let a tool touch it.
      # Forcing Deno's own npm cache instead of a local node_modules dir avoids that.
      #
      # --unstable-sloppy-imports: the @aop/* workspace sources use extensionless
      # relative imports (e.g. `export * from './multiplayer'`), the TS convention this
      # repo's own tsc `moduleResolution` already tolerates. Deno's default ESM resolver
      # requires explicit extensions on relative specifiers; sloppy-imports matches it to
      # the existing source convention instead of rewriting every import in three
      # packages just to satisfy Deno.
      #
      # The @aop/* import map in supabase/functions/deno.json points at the generated
      # (gitignored) _vendor/ tree (#339), so it must be built before any deno command.
      - name: Vendor @aop/* workspace deps
        run: node scripts/vendor-function-deps.mjs
      # Typechecks every function entrypoint against the vendored @aop/* sources via
      # the import map in supabase/functions/deno.json (same invocation pattern as the
      # comment atop supabase/functions/_shared/match.test.ts).
      - name: deno check (every function entrypoint)
        run: |
          deno check --node-modules-dir=none --unstable-sloppy-imports \
            --import-map=supabase/functions/deno.json supabase/functions/*/index.ts
      # Runs every *.test.ts under supabase/functions (currently just _shared/match.test.ts).
      # --no-check: `deno check` above already typechecks the full module graph: running
      # it again here would only duplicate that failure, not add coverage.
      - name: deno test
        run: |
          deno test --no-check --node-modules-dir=none --unstable-sloppy-imports \
            --import-map=supabase/functions/deno.json supabase/functions/
